<!doctype html>
<html>
  <head>
    <title>My Online Store</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background-color: #f5f5f5;
      }

      /* Header */
      header {
        background-color: #4caf50;
        color: white;
        padding: 15px;
        text-align: center;
      }

      /* Navbar */
      nav {
        background-color: #333;
        padding: 10px;
        text-align: center;
      }

      nav a {
        color: white;
        margin: 10px;
        text-decoration: none;
        font-weight: bold;
      }

      nav a:hover {
        color: #4caf50;
      }

      /* Container */
      .container {
        padding: 20px;
      }

      /* Product Cards */
      .products {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
      }

      .card {
        background: white;
        padding: 15px;
        border-radius: 10px;
        width: 200px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        text-align: center;
      }

      .card button {
        background-color: #4caf50;
        color: white;
        border: none;
        padding: 10px;
        border-radius: 5px;
        cursor: pointer;
      }

      .card button:hover {
        background-color: #45a049;
      }

      /* Cart Button */
      .cart-btn {
        position: fixed;
        top: 20px;
        right: 20px;
        background-color: orange;
        color: white;
        padding: 10px;
        border-radius: 5px;
        text-decoration: none;
      }

      /* User Info */
      .user-info {
        position: fixed;
        top: 20px;
        left: 20px;
        background: #333;
        color: white;
        padding: 10px;
        border-radius: 5px;
      }
    </style>
  </head>

  <body>
    <header>
      <h1>🛒 My Online Store</h1>
      <p>Best Products at Best Prices</p>
    </header>

    <nav>
      <a href="#">Home</a>
      <a href="#">Products</a>
      <a href="#">Contact</a>
      <a href="login.html">Login</a>
    </nav>

    <!-- User Info -->
    <div class="user-info" id="userBox"></div>

    <a href="cart.html" class="cart-btn">🛍 View Cart</a>

    <div class="container">
      <h2>Our Products</h2>

      <div class="products">
        <div class="card">
          <h3>T-Shirt</h3>
          <p>₹500</p>
          <button onclick="buyProduct('T-Shirt')">Buy Now</button>
        </div>

        <div class="card">
          <h3>Shoes</h3>
          <p>₹1000</p>
          <button onclick="buyProduct('Shoes')">Buy Now</button>
        </div>

        <div class="card">
          <h3>Watch</h3>
          <p>₹750</p>
          <button onclick="buyProduct('Watch')">Buy Now</button>
        </div>
      </div>

      <h2>Contact Us</h2>
      <p>Email: mystore@gmail.com</p>
      <p>Phone: +91 9876543210</p>
    </div>

    <footer>
      <p>© 2026 My Online Store | All Rights Reserved</p>
    </footer>

    <script>
      // Check login
      let currentUser = localStorage.getItem("loggedInUser");
      let userBox = document.getElementById("userBox");

      if (currentUser) {
        userBox.innerHTML =
          "👤 " +
          currentUser +
          " <br><button onclick='logout()'>Logout</button>";
      } else {
        userBox.innerHTML = "Not Logged In";
      }

      // Buy Product
      function buyProduct(productName) {
        if (!currentUser) {
          alert("Please login first!");
          window.location.href = "login.html";
          return;
        }

        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        cart.push(productName);
        localStorage.setItem("cart", JSON.stringify(cart));

        alert(productName + " added to cart!");
      }

      // Logout
      function logout() {
        localStorage.removeItem("loggedInUser");
        alert("Logged out!");
        location.reload();
      }
    </script>
  </body>
</html>
