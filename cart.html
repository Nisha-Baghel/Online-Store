<!doctype html>
<html>
  <head>
    <title>My Cart</title>

    <style>
      body {
        font-family: Arial;
        background-color: #f5f5f5;
        padding: 20px;
      }

      h1 {
        text-align: center;
      }

      .cart-container {
        background: white;
        padding: 20px;
        border-radius: 10px;
        max-width: 500px;
        margin: auto;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }

      ul {
        list-style-type: none;
        padding: 0;
      }

      li {
        padding: 10px;
        border-bottom: 1px solid #ddd;
      }

      button {
        background-color: red;
        color: white;
        padding: 10px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin-top: 10px;
      }
    </style>
  </head>

  <body>
    <h1>🛒 Your Cart</h1>

    <div class="cart-container">
      <ul id="cartItems"></ul>

      <button onclick="clearCart()">Clear Cart</button>
    </div>

    <script>
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      let list = document.getElementById("cartItems");

      if (cart.length === 0) {
        list.innerHTML = "<p>Cart is empty</p>";
      } else {
        cart.forEach((item) => {
          let li = document.createElement("li");
          li.textContent = item;
          list.appendChild(li);
        });
      }

      function clearCart() {
        localStorage.removeItem("cart");
        location.reload();
      }
    </script>
  </body>
</html>
